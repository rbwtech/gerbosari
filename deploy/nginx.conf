upstream gerbosari_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

map $uri $cache_control {
    default                                                                              "no-cache";
    "~*\.(?:js|css|woff2?|ttf|otf|eot|svg|ico|png|jpe?g|gif|webp|avif)$"                  "public, max-age=31536000, immutable";
}

server {
    listen 80;
    server_name gerbosari.rbwtech.io;
    index index.html;
    root /www/wwwroot/gerbosari.rbwtech.io;

    include /www/server/panel/vhost/nginx/well-known/gerbosari.rbwtech.io.conf;
    error_page 404 /404.html;
    error_page 502 /502.html;

    include /www/server/panel/vhost/rewrite/gerbosari.rbwtech.io.conf;

    access_log /www/wwwlogs/gerbosari.rbwtech.io.log;
    error_log  /www/wwwlogs/gerbosari.rbwtech.io.error.log;

    client_max_body_size 16M;
    server_tokens off;

    add_header X-Content-Type-Options    "nosniff"                                always;
    add_header X-Frame-Options           "DENY"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"        always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md)$ {
        return 404;
    }

    location ^~ /_backend/ {
        deny all;
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location /api/ {
        proxy_pass         http://gerbosari_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://gerbosari_backend/api/health;
    }

    location /images/ {
        alias /www/wwwroot/gerbosari.rbwtech.io/content/images/;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location ~* \.(gif|jpg|jpeg|png|bmp|swf|webp|avif|ico|svg)$ {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        error_log /dev/null;
        access_log /dev/null;
    }

    location / {
        add_header Cache-Control $cache_control always;
        try_files $uri $uri/ /index.html;
    }
}