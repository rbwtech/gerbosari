upstream gerbosari_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server
{
    listen 80;
    listen 443 ssl http2 ;
    server_name gerbosari.rbwtech.io www.gerbosari.rbwtech.io;
    index index.html index.htm default.html;
    root /www/wwwroot/gerbosari.rbwtech.io;
    include /www/server/panel/vhost/nginx/extension/gerbosari.rbwtech.io/*.conf;

    #CERT-APPLY-CHECK--START
    # Configuration related to file verification for SSL certificate application - Do not delete
    include /www/server/panel/vhost/nginx/well-known/gerbosari.rbwtech.io.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START SSL related configuration, do NOT delete or modify the next line of commented-out 404 rules
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/gerbosari.rbwtech.io/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/gerbosari.rbwtech.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START  Error page configuration, allowed to be commented, deleted or modified
    error_page 404 /404.html;
    error_page 502 /502.html;
    #ERROR-PAGE-END

    #REWRITE-START URL rewrite rule reference, any modification will invalidate the rewrite rules set by the panel
    include /www/server/panel/vhost/rewrite/gerbosari.rbwtech.io.conf;
    #REWRITE-END

    access_log /www/wwwlogs/gerbosari.rbwtech.io.log;
    error_log  /www/wwwlogs/gerbosari.rbwtech.io.error.log;

    # ------------------------------------------------------------------
    # Basic hardening
    # ------------------------------------------------------------------
    client_max_body_size 16M;
    server_tokens off;

    # ------------------------------------------------------------------
    # Security headers — declared ONCE at server scope so they apply to
    # every response. Do NOT add `add_header` at location level below or
    # these will be dropped per nginx replacement semantics.
    # ------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                                  always;
    add_header X-Frame-Options           "DENY"                                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://*.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https: ; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.cloudflareinsights.com https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # ------------------------------------------------------------------
    # Compression
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ------------------------------------------------------------------
    # Forbidden files & sensitive directories
    # ------------------------------------------------------------------
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md)$ {
        return 404;
    }

    # _backend tree must never be accessible over HTTP.
    location ^~ /_backend/ {
        deny all;
        return 404;
    }

    # well-known: required by aaPanel cert flow; block code-like extensions inside.
    location ~ \.well-known {
        allow all;
    }
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # ------------------------------------------------------------------
    # Backend API (Axum on 127.0.0.1:3000). `^~` so regex blocks below
    # cannot accidentally intercept.
    # ------------------------------------------------------------------
    location ^~ /api/ {
        proxy_pass         http://gerbosari_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /healthz {
        access_log off;
        proxy_pass http://gerbosari_backend/api/health;
    }

    # ------------------------------------------------------------------
    # Gallery & content images. `^~` is REQUIRED — without it the generic
    # `~* \.(jpg|png|...)$` regex below wins prefix-vs-regex and breaks
    # the alias mapping, serving from $root instead of content/images/.
    # ------------------------------------------------------------------
    location ^~ /images/ {
        alias /www/wwwroot/gerbosari.rbwtech.io/content/images/;
        access_log off;
        expires 30d;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------
    # Static asset fingerprints. Use ONLY `expires` (nginx auto-emits
    # Cache-Control + Expires) so the server-scope security headers above
    # are NOT replaced.
    # ------------------------------------------------------------------
    location ~* \.(gif|jpg|jpeg|png|bmp|swf|webp|avif|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        access_log off;
    }

    # ------------------------------------------------------------------
    # SPA fallback — index.html for any unmatched route (hash router).
    # No `add_header` here either, so HSTS/CSP/etc. propagate from server.
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
